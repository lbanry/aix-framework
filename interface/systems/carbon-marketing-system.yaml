name: Carbon Marketing Interface System
version: 0.1.0
tokens:
  color:
    - background
    - layer-01
    - layer-02
    - text-primary
    - text-secondary
    - border-subtle
    - interactive
    - focus
    - support-success
    - support-warning
    - support-error
  spacing:
    - spacing-03
    - spacing-05
    - spacing-07
    - spacing-09
    - layout-03
    - layout-05
components:
  - id: UIShellHeader
    purpose: Provide persistent product orientation and top-level navigation.
    supports:
      - headline
      - primary_cta
    states:
      - default
      - focus
    rules:
      - Use a skip-to-main-content link before navigation.
      - Keep primary navigation short and task-oriented.
  - id: Button
    purpose: Communicate actions users can take.
    supports:
      - primary_cta
      - secondary_cta
    states:
      - primary
      - secondary
      - ghost
      - focus
      - disabled
    rules:
      - Button labels must express the action that will occur.
      - Primary action appears before secondary actions on full-page designs.
  - id: Link
    purpose: Navigate to supporting information without competing with primary actions.
    supports:
      - secondary_cta
      - proof
    states:
      - default
      - visited
      - focus
    rules:
      - Use links for navigation to docs, GitHub, and supporting references.
  - id: Tile
    purpose: Display modular feature, proof, and next-step content on the grid.
    supports:
      - product_positioning
      - product_offer
      - art_styles
      - included_package
      - how_it_works
      - optional_upgrades
      - capabilities
      - proof
      - workflow
      - confirmation
    states:
      - base
      - clickable
      - focus
    rules:
      - Use tiles as simple, foundational containers on the Carbon grid.
      - Do not put multiple competing click targets inside clickable tiles.
  - id: StructuredList
    purpose: Compare related information in a clear, scan-friendly structure.
    supports:
      - problem
      - solution
      - order_summary
      - success_metrics
    rules:
      - Keep each row parallel so users can compare without reinterpreting labels.
      - Do not rely on color alone to distinguish problem from solution.
  - id: CodeSnippet
    purpose: Present a command or code value users may copy.
    supports:
      - primary_cta
      - secondary_cta
      - admin_order_record
    states:
      - single-line
      - focus
    rules:
      - Use only for commands or code-like text.
      - Provide a visible label that explains the command outcome.
  - id: Tag
    purpose: Label runtimes, statuses, and supported technologies.
    supports:
      - integrations
      - proof
      - upgrade_interest
    states:
      - gray
      - blue
      - green
    rules:
      - Use short nouns or product names.
      - Do not use tags as paragraph replacements.
  - id: Form
    purpose: Collect structured customer and product details.
    supports:
      - intake_form
      - customer_details
      - graduate_details
      - delivery_deadline
    states:
      - default
      - error
      - focus
    rules:
      - Group related inputs under clear section headings.
      - Required fields must have labels and validation messages.
  - id: FileUploader
    purpose: Collect customer images needed for custom artwork.
    supports:
      - photo_uploads
    states:
      - default
      - selected
      - error
    rules:
      - State the required photo count before upload.
      - Do not imply exact likeness is guaranteed.
  - id: Checkbox
    purpose: Capture consent and optional upgrade interest.
    supports:
      - photo_permission
      - upgrade_interest
    states:
      - checked
      - unchecked
      - focus
    rules:
      - Consent checkboxes must use explicit human-readable language.
  - id: RadioTile
    purpose: Let users select one visual style from a small set of options.
    supports:
      - style_selection
      - art_styles
    states:
      - selected
      - unselected
      - focus
    rules:
      - Use single-select behavior when exactly one option is allowed.
      - Each option must include a name, preview, and short description.
  - id: Accordion
    purpose: Present frequently asked questions in a compact, scannable format.
    supports:
      - faq
    states:
      - expanded
      - collapsed
      - focus
    rules:
      - Use question labels that match customer objections.
      - Keep answers specific to MVP scope and exclusions.
  - id: Notification
    purpose: Confirm submission status and set expectations for next steps.
    supports:
      - confirmation
    states:
      - success
      - informational
    rules:
      - Confirmation must say what happened and what happens next.
patterns:
  - id: carbon_technical_product_landing
    purpose: Present a technical product using Carbon structure, tokens, and reusable components.
    use_when:
      - product_marketing_landing
      - developer_tool_website
    required_components:
      - UIShellHeader
      - Button
      - Link
      - Tile
      - StructuredList
      - CodeSnippet
      - Tag
    information_order:
      - headline
      - product_positioning
      - primary_cta
      - problem
      - solution
      - workflow
      - capabilities
      - integrations
      - proof
      - secondary_cta
      - product_offer
      - art_styles
      - included_package
      - how_it_works
      - optional_upgrades
      - faq
      - intake_form
      - photo_uploads
      - photo_permission
      - order_summary
      - confirmation
      - admin_order_record
    rules:
      - Use Carbon role-based tokens instead of hard-coded color semantics.
      - Use the Carbon grid and tiles for modular content.
      - Use structured lists for comparison and operational proof.
      - Keep the experience practical, dense, and enterprise-readable.
accessibility_rules:
  - Include a skip-to-main-content link.
  - Preserve visible focus states on navigation, buttons, links, code snippets, and tiles.
  - Use semantic headings in descending order.
  - Do not rely on color alone for comparison, state, or status.
  - Provide text alternatives for product and integration imagery.
